<header class="navbar">
  <button
    type="button"
    class="navbar__menu"
    aria-controls="sidebar"
    [attr.aria-expanded]="sidebarOpen()"
    (click)="menuToggle.emit()"
  >
    <svg aria-hidden="true" viewBox="0 0 20 20" width="20" height="20">
      <path d="M3 5h14M3 10h14M3 15h14" stroke="currentColor" stroke-width="1.75" fill="none" />
    </svg>
    <span class="visually-hidden">
      {{ sidebarOpen() ? 'Cerrar navegación' : 'Abrir navegación' }}
    </span>
  </button>

  <a class="navbar__brand" routerLink="/">
    <span class="navbar__mark" aria-hidden="true">/</span>
    <span class="navbar__name">Desarrollo con IA</span>
  </a>

  <button
    type="button"
    class="navbar__theme"
    [attr.aria-pressed]="isDark()"
    (click)="toggleTheme()"
  >
    <span aria-hidden="true">{{ isDark() ? 'claro' : 'oscuro' }}</span>
    <span class="visually-hidden">Activar tema {{ isDark() ? 'claro' : 'oscuro' }}</span>
  </button>
</header>
